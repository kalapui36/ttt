<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>샛별교사 업무포털 활용 매뉴얼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
        }

        /* 전체 페이지 배경 (부드러운 그레이톤으로 변경하여 카드와 대비를 줌) */
        body {
            background-color: #f1f5f9;
            color: #333;
            line-height: 1.6;
        }

        /* 1. 최상단 타이틀 영역 (이미지 배경에 맞춰 흰색 유지) */
        .top-image-section {
            background-color: #ffffff;
            text-align: center;
            padding: 40px 20px 10px;
        }

        .top-image-section img {
            max-width: 100%;
            height: auto;
            margin-bottom: 25px;
        }

        .main-title-text {
            font-size: 32px;
            font-weight: 800;
            color: #1a365d;
            letter-spacing: -1px;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        /* 2. 서브 헤더 텍스트 영역 (흰색 유지하되 레이아웃 조정) */
        .sub-header {
            background-color: #ffffff;
            padding: 0px 20px 30px;
            border-bottom: 1px solid #e2e8f0;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .sub-header .main-desc {
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            text-align: center; /* 설명글은 가운데 정렬 유지 */
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .sub-header .author {
            font-size: 14px;
            color: #718096;
            text-align: right; /* ✨ 요청하신 우측 정렬 적용 */
            display: block;
        }

        /* 3. 매뉴얼 카드 그리드 영역 (배경 회색 위에서 카드들이 강조됨) */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .manual-card {
            background: white; /* 카드 자체는 하얀색으로 유지하여 가독성 확보 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffffff;
        }

        .manual-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3182ce;
        }

        .card-image-wrap {
            width: 100%;
            height: 180px;
            background-color: #f8fafc;
            position: relative;
            overflow: hidden;
        }

        .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .manual-card:hover .card-image-wrap img {
            transform: scale(1.08);
        }

        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 14px;
            background-color: #f1f5f9;
        }

        .card-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-number {
            display: inline-block;
            background-color: #eff6ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .card-title {
            font-size: 19px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-action {
            margin-top: auto;
            font-size: 14px;
            font-weight: 600;
            color: #3b82f6;
            display: flex;
            align-items: center;
        }

        .card-action::after {
            content: '→';
            margin-left: 6px;
            transition: margin 0.2s ease;
        }

        .manual-card:hover .card-action::after {
            margin-left: 10px;
        }

        /* 4. 최하단 푸터 (로고 배경에 맞춰 흰색 유지) */
        footer {
            background-color: #ffffff;
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid #e2e8f0;
        }

        footer img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="top-image-section">
        <img src="title.png" alt="샛별교사 타이틀 이미지" onerror="this.style.display='none'">
        <h1 class="main-title-text">업무포털 활용 매뉴얼</h1>
    </div>

    <div class="sub-header">
        <div class="header-inner">
            <p class="main-desc">샛별교사에게 가장 필요한 내용을 선별하여, 샛별교사가 직접 만든 매뉴얼</p>
            <p class="author">제작: 서울개봉초등학교 샛별교사 김태완</p>
        </div>
    </div>

    <div class="container" id="manual-container"></div>

    <footer>
        <img src="logo.png" alt="서울특별시남부교육지원청 로고" onerror="this.style.display='none'">
    </footer>

    <script src="data.js"></script>
    <script>
        const container = document.getElementById('manual-container');
        manualData.forEach(item => {
            const imageHtml = item.thumbnail 
                ? `<img src="${item.thumbnail}" alt="${item.title}" onerror="this.outerHTML='<div class=\\'no-image\\'>이미지 준비중</div>'">`
                : `<div class="no-image">이미지 없음</div>`;

            const cardHtml = `
                <a href="${item.link}" class="manual-card">
                    <div class="card-image-wrap">${imageHtml}</div>
                    <div class="card-content">
                        <span class="card-number">Manual ${String(item.id).padStart(2, '0')}</span>
                        <h2 class="card-title">${item.title}</h2>
                        <p class="card-desc">${item.description}</p>
                        <div class="card-action">상세 내용 보기</div>
                    </div>
                </a>
            `;
            container.innerHTML += cardHtml;
        });
    </script>
</body>
</html>
