<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>샛별교사 업무포털 활용 매뉴얼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #333;
            line-height: 1.6;
        }

        /* ✨ 1. 헤더 전체를 묵직한 남색으로 통일 */
        header {
            background-color: #1a365d;
            padding: 60px 20px 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-inner {
            max-width: 900px; /* 명패와 텍스트가 정돈되게 모이는 너비 */
            margin: 0 auto;
        }

        /* ✨ 2. 하얀색 타이틀 이미지를 담는 둥근 명패(액자) 디자인 */
        .title-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 35px 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .title-card img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* 3. 텍스트 영역 (남색 배경 위 흰색 텍스트) */
        .desc-text {
            text-align: center;
            color: #edf2f7;
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        .author-box {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            text-align: right;
        }

        .author-text {
            color: #90cdf4; /* 하늘색으로 포인트 */
            font-size: 15px;
            font-weight: 500;
        }

        /* 4. 매뉴얼 카드 그리드 영역 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .manual-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffffff;
        }

        .manual-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3182ce;
        }

        .card-image-wrap {
            width: 100%;
            height: 180px;
            background-color: #f8fafc;
            position: relative;
            overflow: hidden;
        }

        .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .manual-card:hover .card-image-wrap img {
            transform: scale(1.08);
        }

        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 14px;
            background-color: #f1f5f9;
        }

        .card-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-number {
            display: inline-block;
            background-color: #eff6ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .card-title {
            font-size: 19px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-action {
            margin-top: auto;
            font-size: 14px;
            font-weight: 600;
            color: #3b82f6;
            display: flex;
            align-items: center;
        }

        .card-action::after {
            content: '→';
            margin-left: 6px;
            transition: margin 0.2s ease;
        }

        .manual-card:hover .card-action::after {
            margin-left: 10px;
        }

        /* ✨ 5. 최하단 푸터 (로고 제한 풀어서 예전처럼 큼지막하게) */
        footer {
            background-color: #ffffff;
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid #e2e8f0;
        }

        footer img {
            max-width: 100%; /* 너비 제한 해제 */
            height: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="title-card">
                <img src="title.png" alt="샛별교사 타이틀 이미지" onerror="this.style.display='none'">
            </div>
            
            <div class="desc-text">샛별교사에게 가장 필요한 내용을 선별하여, 샛별교사가 직접 만든 업무포털 활용법</div>
            <div class="author-box">
                <span class="author-text">제작: 서울개봉초등학교 샛별교사 김태완</span>
            </div>
        </div>
    </header>

    <div class="container" id="manual-container"></div>

    <footer>
        <img src="logo.png" alt="서울특별시남부교육지원청 로고" onerror="this.style.display='none'">
    </footer>

    <script src="data.js"></script>
    <script>
        const container = document.getElementById('manual-container');
        manualData.forEach(item => {
            const imageHtml = item.thumbnail 
                ? `<img src="${item.thumbnail}" alt="${item.title}" onerror="this.outerHTML='<div class=\\'no-image\\'>이미지 준비중</div>'">`
                : `<div class="no-image">이미지 없음</div>`;

            const cardHtml = `
                <a href="${item.link}" class="manual-card">
                    <div class="card-image-wrap">${imageHtml}</div>
                    <div class="card-content">
                        <span class="card-number">Manual ${String(item.id).padStart(2, '0')}</span>
                        <h2 class="card-title">${item.title}</h2>
                        <p class="card-desc">${item.description}</p>
                        <div class="card-action">상세 내용 보기</div>
                    </div>
                </a>
            `;
            container.innerHTML += cardHtml;
        });
    </script>
</body>
</html>
